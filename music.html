<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Figtree:wght@700;900&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="style.css">

  <style>
    :root {
      --bg: rgb(255, 255, 255);
      --darkred: #000000;
      --bigtext: #000000;
      --paper: #fff;
      --ink: #1d1d1f;

      --teal: #420014;
      --lemon: #766102;
      --pink: #b8bfd9;
      --red: #d86e2d;
      --blue: #fdd9cb;
        --navy: #0a215a;

      --active: #cedcff;
      --hover: #c1b99a;

      --ipod: #0a215a;
      --screen: #ffffff;
      --screen-ink: #000000;
      --wheel: #cedcff;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--darkred);
      font-family: "Figtree", sans-serif;
      text-transform: uppercase;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }



    /* ── Layout ─────────────────────────────────────────────────────────── */
    main {
      width: 100%;
      min-height: 100vh;
      display: grid;
      align-items: start;
      /* always leave room for fixed right nav */
      padding: 3.25rem 170px 2.5rem 2rem;
    }

    .wrap {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 2rem;
      width: 100%;
      margin-top: 2rem;
      align-items: start;
    }

    /* ── iPod ───────────────────────────────────────────────────────────── */
    .ipod {
      background: var(--ipod);
      border-radius: 22px;
      padding: 18px 18px 16px;
      border: 3px solid rgba(0,0,0,.08);
      width: 340px;
      height: 590px;
    }

    .ipod-inner { display: grid; gap: 14px; }

    .ipod-screen {
      background: var(--screen);
      border-radius: 12px;
      border: 3px solid #cedcff;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .screen-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-family: Inter, sans-serif;
      font-weight: 900;
      letter-spacing: .09em;
      font-size: 12px;
      color: var(--screen-ink);
    }

    .screen-pill {
      font-family: Inter, sans-serif;
      font-weight: 900;
      letter-spacing: .08em;
      font-size: 10px;
      padding: 3px 6px;
      border: 2px solid rgba(0,0,0,.16);
      border-radius: 999px;
      background: #fff;
      white-space: nowrap;
    }


    .tracklist {
      list-style: none;
      display: grid;
      gap: 6px;
      max-height: 220px;
      overflow: auto;
      padding-right: 4px;
    }

    .tracklist::-webkit-scrollbar { width: 10px; }
    .tracklist::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,.18);
      border-radius: 999px;
      border: 3px solid #fff;
    }

    .track {
      border-radius: 10px;
      border: 2px solid rgba(0,0,0,.10);
      padding: 8px;
      cursor: pointer;
      background: #fff;
      transition: background 120ms ease;
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 8px;
      align-items: start;
    }

    .track:hover { background: var(--hover); }
    .track[aria-current="true"] { background: var(--active); }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      margin-top: 2px;
      border: 2px solid rgba(0,0,0,.10);
    }

    .track:nth-child(4n+1) .dot { background: var(--teal); }
    .track:nth-child(4n+2) .dot { background: var(--lemon); }
    .track:nth-child(4n+3) .dot { background: var(--pink); }
    .track:nth-child(4n+4) .dot { background: var(--blue); }

    .track[aria-current="true"] .dot {
      animation: dot-spin 1.2s linear infinite;
    }

    @keyframes dot-spin {
      0%   { border-radius: 3px;  transform: rotate(0deg); }
      50%  { border-radius: 50%;  transform: rotate(180deg); }
      100% { border-radius: 3px;  transform: rotate(360deg); }
    }

    .t-title {
      font-family: Inter, sans-serif;
      font-weight: 900;
      font-size: 12px;
      letter-spacing: .06em;
      color: #000;
      line-height: 1.2;
    }

    /* Progress bar */
    .progress-bar {
      position: relative;
      height: 10px;
      border-radius: 999px;
      border: 2px solid rgba(0,0,0,.12);
      background: rgba(0,0,0,.06);
      overflow: hidden;
      cursor: pointer;
    }

    .progress-fill {
      position: absolute;
      inset: 0;
      width: 0%;
      background: var(--pink);
      background-size: 200% 100%;
      transition: width .2s linear;
    }

    .is-playing .progress-fill {
      animation: shimmer 2s linear infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }

    .progress-bar input[type="range"] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .screen-time {
      display: flex;
      justify-content: space-between;
      font-family: Inter, sans-serif;
      font-weight: 900;
      letter-spacing: .08em;
      font-size: 10px;
      color: rgba(0,0,0,.65);
      padding: 0 2px;
    }

    .screen-time .slash { opacity: .5; }

    /* Wheel */
    .wheel { display: grid; place-items: center; padding: 8px 0 6px; }

    .wheel-ring {
      width: 190px;
      height: 190px;
      border-radius: 999px;
      background: var(--wheel);
      border: 3px solid rgba(0,0,0,.10);
      display: grid;
      place-items: center;
      position: relative;
    }


    @keyframes ring-glow {
      0%, 100% { box-shadow: 0 0 0 4px rgba(210,108,50,.35); }
      50%       { box-shadow: 0 0 0 8px rgba(255, 94, 0, 0.15); }
    }

    .wheel-center {
      width: 64px;
      height: 64px;
      border-radius: 999px;
      background: var(--navy);
      border: 2px solid var(--navy);
      pointer-events: none;
    }

    .wheel-label {
      position: absolute;
      font-family: Inter, sans-serif;
      font-weight: 900;
      letter-spacing: .10em;
      font-size: 12px;
      color: var(--navy);
      user-select: none;
      pointer-events: none;
    }

    .wheel-label.menu { top: 16px; }

    .wheel-btn {
      position: absolute;
      font-family: Inter, sans-serif;
      font-weight: 900;
      font-size: 18px;
      color: var(--navy);
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 8px;
      border-radius: 6px;
      line-height: 1;
      user-select: none;
      transition: color 120ms ease, transform 120ms ease;
    }

    .wheel-btn:hover  { color: rgba(0,0,0,.9); }
    .wheel-btn:active { transform: scale(.88); }

    .wheel-btn.prev {
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
    }
    .wheel-btn.prev:hover { transform: translateY(-50%) scale(1.15); }
    .wheel-btn.prev:active { transform: translateY(-50%) scale(.88); }

    .wheel-btn.next {
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
    }
    .wheel-btn.next:hover { transform: translateY(-50%) scale(1.15); }
    .wheel-btn.next:active { transform: translateY(-50%) scale(.88); }

    .wheel-btn.play {
      bottom: 12px;
      font-size: 16px;
    }

    /* ── Score panel ────────────────────────────────────────────────────── */
    .score-panel {
      background: var(--paper);
      border-radius: 16px;
      border: 3px solid var(--pink);
      display: flex;
      flex-direction: column;
      /* fill height of the iPod (approx) but cap at viewport */
      height: min(620px, 86vh);
      overflow: hidden;
    }

    /* Hide the whole panel when no score for current track */
    .score-panel[hidden] { display: none; }

    .score-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      flex-shrink: 0;
      gap: 10px;
    }

    .score-title {
      font-family: Inter, sans-serif;
      font-weight: 600;
      font-size: 1.2rem;
      color: #000;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .score-nav-btns { display: flex; gap: 4px; flex-shrink: 0; }

    .score-nav-btns button {
      font-family: Inter, sans-serif;
      font-weight: 900;
      font-size: 14px;
      background: transparent;
      border: 2px solid var(--pink);
      border-radius: 6px;
      padding: 4px 12px;
      cursor: pointer;
      color: var(--darkred);
      transition: background 120ms ease, transform 120ms ease;
    }

    .score-nav-btns button:hover {
      background: rgba(0,0,0,.06);
      transform: translateY(-1px);
    }

    .score-nav-btns button:disabled {
      opacity: .3;
      cursor: not-allowed;
      transform: none;
    }

    .score-body {
      flex: 1;
      overflow: hidden;
      display: flex;
      align-items: stretch;
    }

    .score-spread {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100%;
      height: 100%;
    }

    .score-page {
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--paper);
      height: 100%;
    }

    .score-page + .score-page {
      border-left: 1px solid rgba(0,0,0,.07);
    }

    .score-page canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }

    /* ── Responsive ─────────────────────────────────────────────────────── */
    @media (max-width: 900px) {
      main {
        padding: 7rem 1rem 2rem;
      }

      .wrap {
        grid-template-columns: 1fr;
        justify-items: center;
      }

      .score-panel {
        width: 100%;
        max-width: 480px;
        height: auto;
      }

      .score-spread {
        /* single page on mobile */
        grid-template-columns: 1fr;
        height: auto;
      }

      .score-page {
        height: auto;
        min-height: 320px;
      }

      .score-page canvas {
        width: 100% !important;
        height: auto !important;
      }

      /* hide left page on mobile — show right only */
      #leftPageWrap { display: none !important; }
    }

    @media (max-width: 700px) {
      .btn { font-size: 1rem; }
      .wheel-ring { width: 175px; height: 175px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .btn, .track, .wheel-btn, .progress-fill,
      .wheel-ring, .screen-pill, .dot { animation: none !important; transition: none !important; }
    }
  </style>
</head>

<body>
  <button class="hamburger" aria-label="Toggle menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>

  <div class="mobile-menu-overlay"></div>

  <nav class="nav" aria-label="Primary">
    <a class="btn teal" href="aboutme.html">About</a>
    <a class="btn lemon" href="contact.html">Contact</a>

    <div class="dropdown">
      <a class="btn pink dropdownTrigger" href="#" onclick="return false;">Portfolio</a>
      <div class="dropdownMenu" aria-label="Portfolio">
        <a class="btn red" href="music.html">Music</a>
        <a class="btn blue" href="visual.html">Visual</a>
      </div>
    </div>
  </nav>

  <main>
    <section class="wrap">

      <!-- iPod player -->
      <aside class="ipod" aria-label="Playlist">
        <div class="ipod-inner">
          <div class="ipod-screen">
            <div class="screen-top">
              <div>MENU</div>
              <div class="screen-pill" id="screenCount">0 TRACKS</div>
            </div>

            <ul class="tracklist" id="tracklist" aria-live="polite"></ul>

            <div class="progress-bar" id="progressBar">
              <div class="progress-fill" id="progressFill"></div>
              <input type="range" id="progressRange" min="0" max="100" value="0" step="0.1" aria-label="Seek">
            </div>

            <div class="screen-time" aria-live="polite">
              <span id="tCur">0:00</span>
              <span class="slash">/</span>
              <span id="tDur">0:00</span>
            </div>
          </div>

          <div class="wheel">
            <div class="wheel-ring" id="wheelRing">
              <div class="wheel-label menu">MENU</div>
              <button class="wheel-btn prev" id="wPrev" aria-label="Previous track">⟨⟨</button>
              <button class="wheel-btn next" id="wNext" aria-label="Next track">⟩⟩</button>
              <button class="wheel-btn play" id="wPlay" aria-label="Play / Pause">▶</button>
              <div class="wheel-center"></div>
            </div>
          </div>
        </div>
        <audio id="audio" preload="metadata"></audio>
      </aside>

      <!-- Score panel — hidden until a track with a score is selected -->
      <div class="score-panel" id="scorePanel" hidden aria-label="Score viewer">
        <div class="score-nav">
          <span class="score-title" id="scoreTitle"></span>
          <div class="score-nav-btns">
            <button id="scorePrev" aria-label="Previous pages" disabled>←</button>
            <button id="scoreNext" aria-label="Next pages" disabled>→</button>
          </div>
        </div>
        <div class="score-body">
          <div class="score-spread">
            <div class="score-page" id="leftPageWrap">
              <canvas id="canvasLeft"></canvas>
            </div>
            <div class="score-page" id="rightPageWrap">
              <canvas id="canvasRight"></canvas>
            </div>
          </div>
        </div>
      </div>

    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>

  <script>
    // ── Nav ──────────────────────────────────────────────────────────────────
    const hamburger  = document.querySelector('.hamburger');
    const nav        = document.querySelector('.nav');
    const navOverlay = document.querySelector('.mobile-menu-overlay');

    function toggleMenu() {
      const open = hamburger.classList.toggle('active');
      nav.classList.toggle('active');
      navOverlay.classList.toggle('active');
      hamburger.setAttribute('aria-expanded', open);
      document.body.style.overflow = open ? 'hidden' : '';
    }

    hamburger.addEventListener('click', toggleMenu);
    navOverlay.addEventListener('click', toggleMenu);
    nav.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => { if (nav.classList.contains('active')) toggleMenu(); });
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && nav.classList.contains('active')) toggleMenu();
    });

    // ── Track data ────────────────────────────────────────────────────────────
    const TRACKS = [
      { title: "Atmosphere of The Mind", file: "Atmosphere.mp3",     score: "Atmosphere of the Mind.pdf" },
      { title: "Dynamism",               file: "Dynamism.mp3",       score: null },
      { title: "Evolve",                 file: "Evolve.mp3",         score: "Evolve.pdf" },
      { title: "Interconnection",        file: "Interconnection.mp3",score: "Interconnection.pdf" },
      { title: "Crossroads",             file: "Crossroads.mp3",     score: "Crossroads.pdf" },
      { title: "El Canto Del Mar",       file: "Mar.mp3",            score: "El canto del Mar.pdf" },
    ];

    // ── DOM ───────────────────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const tracklist    = $('tracklist');
    const screenCount  = $('screenCount');
    const audio        = $('audio');
    const wPrev        = $('wPrev');
    const wPlay        = $('wPlay');
    const wNext        = $('wNext');
    const tCur         = $('tCur');
    const tDur         = $('tDur');
    const progressFill = $('progressFill');
    const progressRange= $('progressRange');
    const progressBar  = $('progressBar');
    const wheelRing    = $('wheelRing');

    // ── Player ────────────────────────────────────────────────────────────────
    let current = -1;

    function fmt(sec) {
      if (!isFinite(sec) || sec < 0) return '0:00';
      return `${Math.floor(sec/60)}:${String(Math.floor(sec%60)).padStart(2,'0')}`;
    }

    function setPlayingUI(on) {
      wPlay.textContent = on ? '||' : '▶';
      wheelRing.classList.toggle('playing', on);
      screenCount.classList.toggle('playing', on);
      progressBar.classList.toggle('is-playing', on);
    }

    function setCurrentIndex(idx, autoplay) {
      if (!TRACKS.length) return;
      current = (idx + TRACKS.length) % TRACKS.length;

      tracklist.querySelectorAll('.track').forEach((li, i) => {
        li.setAttribute('aria-current', i === current ? 'true' : 'false');
      });

      const tr = TRACKS[current];
      audio.src = `mp3/${encodeURIComponent(tr.file)}`;
      audio.load();
      tCur.textContent = '0:00';
      tDur.textContent = '0:00';
      progressFill.style.width = '0%';
      progressRange.value = 0;

      if (autoplay) audio.play().catch(() => {});
      else setPlayingUI(false);

      loadScore(tr.score);
    }

    function togglePlay() {
      if (current === -1) { setCurrentIndex(0, true); return; }
      if (audio.paused) audio.play().catch(() => {});
      else audio.pause();
    }

    function nextTrack() { if (TRACKS.length) setCurrentIndex(current < 0 ? 0 : current + 1, true); }
    function prevTrack() { if (TRACKS.length) setCurrentIndex(current < 0 ? 0 : current - 1, true); }

    function buildList() {
      tracklist.innerHTML = '';
      TRACKS.forEach((tr, i) => {
        const li    = document.createElement('li');
        const dot   = document.createElement('div');
        const body  = document.createElement('div');
        const title = document.createElement('div');

        li.className = 'track';
        li.setAttribute('role', 'button');
        li.setAttribute('tabindex', '0');
        li.setAttribute('aria-current', 'false');
        dot.className   = 'dot';
        title.className = 't-title';
        title.textContent = tr.title;

        body.appendChild(title);
        li.appendChild(dot);
        li.appendChild(body);

        li.addEventListener('click', () => setCurrentIndex(i, true));
        li.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setCurrentIndex(i, true); }
        });
        tracklist.appendChild(li);
      });
      screenCount.textContent = `${TRACKS.length} TRACKS`;
    }

    // Audio events
    wPlay.addEventListener('click', togglePlay);
    wPrev.addEventListener('click', prevTrack);
    wNext.addEventListener('click', nextTrack);

    audio.addEventListener('play',  () => setPlayingUI(true));
    audio.addEventListener('pause', () => setPlayingUI(false));
    audio.addEventListener('ended', nextTrack);

    audio.addEventListener('loadedmetadata', () => { tDur.textContent = fmt(audio.duration); });

    audio.addEventListener('timeupdate', () => {
      tCur.textContent = fmt(audio.currentTime);
      if (isFinite(audio.duration) && audio.duration > 0) {
        tDur.textContent = fmt(audio.duration);
        const pct = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = pct + '%';
        progressRange.value = pct;
      }
    });

    progressRange.addEventListener('input', () => {
      if (isFinite(audio.duration))
        audio.currentTime = (progressRange.value / 100) * audio.duration;
    });

    window.addEventListener('keydown', e => {
      const tag = (document.activeElement?.tagName || '').toLowerCase();
      if (tag === 'input') return;
      if ((e.key === ' ' || e.code === 'Space') && tag !== 'button') { e.preventDefault(); togglePlay(); }
      if (e.key === 'ArrowRight' && !e.shiftKey) nextTrack();
      if (e.key === 'ArrowLeft'  && !e.shiftKey) prevTrack();
    });

    // ── Score viewer ─────────────────────────────────────────────────────────
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

    const scorePanel   = $('scorePanel');
    const scoreTitle   = $('scoreTitle');
    const scorePrev    = $('scorePrev');
    const scoreNext    = $('scoreNext');
    const canvasLeft   = $('canvasLeft');
    const canvasRight  = $('canvasRight');
    const leftPageWrap = $('leftPageWrap');

    let pdfDoc   = null;
    let spreadStart = 1; // first page of current 2-page spread (always >= 1)

    const isMobile = () => window.matchMedia('(max-width: 900px)').matches;

    async function renderPage(pdf, pageNum, canvas) {
      if (pageNum < 1 || pageNum > pdf.numPages) {
        canvas.style.visibility = 'hidden';
        return;
      }
      canvas.style.visibility = '';
      const page    = await pdf.getPage(pageNum);
      const vp1     = page.getViewport({ scale: 1 });
      const parent  = canvas.parentElement;
      const maxW    = parent.clientWidth  || 300;
      const maxH    = parent.clientHeight || 500;
      const fit     = isMobile()
        ? maxW / vp1.width
        : Math.min(maxW / vp1.width, maxH / vp1.height);
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const vp  = page.getViewport({ scale: fit * dpr });

      canvas.width  = Math.floor(vp.width);
      canvas.height = Math.floor(vp.height);
      canvas.style.width  = Math.floor(vp.width  / dpr) + 'px';
      canvas.style.height = Math.floor(vp.height / dpr) + 'px';

      const ctx = canvas.getContext('2d', { alpha: false });
      ctx.imageSmoothingEnabled = false;
      await page.render({ canvasContext: ctx, viewport: vp, intent: 'display' }).promise;
    }

    async function renderSpread() {
      if (!pdfDoc) return;
      const mobile = isMobile();

      if (mobile) {
        // single page
        await renderPage(pdfDoc, spreadStart, canvasRight);
      } else {
        // two-page spread
        await Promise.all([
          renderPage(pdfDoc, spreadStart,     canvasLeft),
          renderPage(pdfDoc, spreadStart + 1, canvasRight),
        ]);
      }

      scorePrev.disabled = (spreadStart <= 1);
      scoreNext.disabled = mobile
        ? (spreadStart >= pdfDoc.numPages)
        : (spreadStart + 2 > pdfDoc.numPages);
    }

    async function loadScore(scoreFile) {
      pdfDoc = null;

      if (!scoreFile) {
        scorePanel.hidden = true;
        return;
      }

      scorePanel.hidden = false;
      scoreTitle.textContent = scoreFile.replace(/\.pdf$/i, '');
      scorePrev.disabled = true;
      scoreNext.disabled = true;

      try {
        pdfDoc = await pdfjsLib.getDocument(`scores/${encodeURI(scoreFile)}`).promise;
        spreadStart = 1;
        // wait one frame so the panel is laid out and clientWidth/Height are real
        await new Promise(r => requestAnimationFrame(r));
        await renderSpread();
      } catch (err) {
        console.error('Score load error:', err);
        scorePanel.hidden = true;
      }
    }

    scorePrev.addEventListener('click', () => {
      if (!pdfDoc) return;
      spreadStart = Math.max(1, spreadStart - (isMobile() ? 1 : 2));
      renderSpread();
    });

    scoreNext.addEventListener('click', () => {
      if (!pdfDoc) return;
      spreadStart = isMobile()
        ? Math.min(pdfDoc.numPages, spreadStart + 1)
        : Math.min(pdfDoc.numPages - 1, spreadStart + 2);
      renderSpread();
    });

    window.addEventListener('resize', () => { if (pdfDoc) renderSpread(); });

    // ── Init ──────────────────────────────────────────────────────────────────
    buildList();
    if (TRACKS.length) setCurrentIndex(0, false);
  </script>
